services:
  - type: web
    name: streampay-api
    runtime: docker
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /api/health
    envVars:
      # Render injects PORT automatically; the app reads it.
      - key: DB_PATH
        value: /app/data/streampay.db
      - key: CORS_ORIGIN
        value: "*"
