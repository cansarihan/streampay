services:
  - type: web
    name: streampay-api
    runtime: docker
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: CORS_ORIGIN
        value: "*"
      # Set these two in the Render dashboard (persistent Turso/libSQL database):
      - key: TURSO_DATABASE_URL
        sync: false
      - key: TURSO_AUTH_TOKEN
        sync: false
